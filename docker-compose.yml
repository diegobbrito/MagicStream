version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: magicstream-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-password123}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-magicstream}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - magicstream-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./Server/MagicStreamServer
      dockerfile: Dockerfile
    container_name: magicstream-server
    environment:
      PORT: ${SERVER_PORT:-8080}
      MONGODB_URI: ${MONGODB_URI:-mongodb://admin:password123@mongodb:27017/magicstream?authSource=admin}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://client:3000}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - magicstream-network
    restart: unless-stopped

  client:
    build:
      context: ./Client/magic-stream-client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    container_name: magicstream-client
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    ports:
      - "${CLIENT_PORT:-5173}:5173"
    depends_on:
      - server
    networks:
      - magicstream-network
    restart: unless-stopped

volumes:
  mongodb_data:
  mongodb_config:

networks:
  magicstream-network:
    driver: bridge
